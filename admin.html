<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务价格表 - 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --bg-input: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --accent: #a855f7;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* 登录页 */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--bg-secondary);
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
        }

        .login-box h1 {
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .login-box p {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-success {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .btn-success:hover {
            background: rgba(34, 197, 94, 0.2);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }

        /* 管理后台 */
        .admin-container {
            display: none;
        }

        .admin-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .admin-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .admin-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 24px;
        }

        .stat-card h3 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 分类管理 */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-subtle);
            flex-wrap: wrap;
            gap: 12px;
        }

        .section-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header h2 i {
            font-size: 1.25rem;
        }

        .category-ue5 h2 i { color: #a855f7; }
        .category-ppt h2 i { color: #f59e0b; }
        .category-video h2 i { color: #ef4444; }
        .category-computer h2 i { color: #3b82f6; }
        .category-steam h2 i { color: #22c55e; }

        .items-list {
            padding: 16px;
        }

        .item-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .item-card:last-child {
            margin-bottom: 0;
        }

        .item-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .item-card-content {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 16px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .item-card-content {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }

        .item-info h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .item-info .price {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .category-ue5 .item-info .price { color: #a855f7; }
        .category-ppt .item-info .price { color: #f59e0b; }
        .category-video .item-info .price { color: #ef4444; }
        .category-computer .item-info .price { color: #3b82f6; }
        .category-steam .item-info .price { color: #22c55e; }

        .item-info .note {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .item-tag {
            padding: 4px 10px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .item-actions {
            display: flex;
            gap: 8px;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: none;
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 24px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Toast 提示 */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 14px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .toast.success {
            border-color: rgba(34, 197, 94, 0.3);
        }

        .toast.success i {
            color: var(--success);
        }

        .toast.error {
            border-color: rgba(239, 68, 68, 0.3);
        }

        .toast.error i {
            color: var(--danger);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 预览链接 */
        .preview-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--info);
            text-decoration: none;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }

        .preview-link:hover {
            opacity: 0.8;
        }

        /* 通用规则 */
        .rules-section {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .rules-section h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rules-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rule-item-admin {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rule-item-admin input {
            flex: 1;
        }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <h1>🔐 管理后台</h1>
            <p>请输入管理员密码登录</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入管理员密码" required>
                    <div class="error-msg" id="loginError">密码错误，请重试</div>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="ph ph-sign-in"></i>
                    登录
                </button>
            </form>
            <p style="margin-top: 20px; font-size: 0.8rem; color: var(--text-secondary);">
                默认密码: admin
            </p>
        </div>
    </div>

    <!-- 管理后台 -->
    <div class="admin-container" id="adminPage">
        <header class="admin-header">
            <div class="admin-header-inner">
                <h1>
                    <i class="ph ph-gear-six"></i>
                    价格管理后台
                </h1>
                <div class="admin-header-actions">
                    <a href="index.html" target="_blank" class="preview-link">
                        <i class="ph ph-eye"></i>
                        预览前台
                    </a>
                    <button class="btn btn-secondary btn-sm" onclick="exportData()">
                        <i class="ph ph-download"></i>
                        导出
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="importData()">
                        <i class="ph ph-upload"></i>
                        导入
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="resetData()">
                        <i class="ph ph-arrow-counter-clockwise"></i>
                        重置
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="logout()">
                        <i class="ph ph-sign-out"></i>
                        退出
                    </button>
                </div>
            </div>
        </header>

        <div class="admin-content">
            <!-- 统计 -->
            <div class="stats-grid" id="statsGrid"></div>

            <!-- 通用规则管理 -->
            <div class="rules-section">
                <h2><i class="ph ph-list-checks" style="color: #22c55e;"></i> 通用规则</h2>
                <div class="rules-list" id="rulesList"></div>
            </div>

            <!-- 分类管理区 -->
            <div id="categoriesContainer"></div>
        </div>
    </div>

    <!-- 添加/编辑模态框 -->
    <div class="modal-overlay" id="itemModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">添加项目</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="itemForm">
                    <input type="hidden" id="itemId">
                    <input type="hidden" id="itemCategory">
                    <div class="form-group">
                        <label>项目名称</label>
                        <input type="text" id="itemName" placeholder="例如：简单室内场景" required>
                    </div>
                    <div class="form-group">
                        <label>价格</label>
                        <input type="text" id="itemPrice" placeholder="例如：¥80-150" required>
                    </div>
                    <div class="form-group">
                        <label>说明</label>
                        <textarea id="itemNote" placeholder="简短描述..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="itemHot" style="width: auto; margin-right: 8px;">
                            标记为加急项目
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveItem()">
                    <i class="ph ph-check"></i>
                    保存
                </button>
            </div>
        </div>
    </div>

    <!-- 导入模态框 -->
    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <div class="modal-header">
                <h2>导入数据</h2>
                <button class="modal-close" onclick="closeImportModal()">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>粘贴 JSON 数据</label>
                    <textarea id="importData" placeholder='{"ue5": [...], "ppt": [...], "rules": [...]}' style="min-height: 200px; font-family: monospace;"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeImportModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmImport()">
                    <i class="ph ph-upload"></i>
                    确认导入
                </button>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // 配置
        const DEFAULT_PASSWORD = 'admin';
        const STORAGE_KEY = 'priceListData';

        // 默认数据
        const defaultData = {
            ue5: [
                { id: 1, name: '简单室内 / 小场景', price: '¥80–150', note: '新手入门级场景搭建', hot: false },
                { id: 2, name: '室外简易场景 / 小地图', price: '¥150–260', note: '含地形、植被、简单物件', hot: false },
                { id: 3, name: '场景微调 / 换材质灯光', price: '¥50–100', note: '调整现有场景效果', hot: false },
                { id: 4, name: '24 小时加急', price: '×1.5', note: '紧急项目优先处理', hot: true }
            ],
            ppt: [
                { id: 1, name: '纯文字排版（10 页内）', price: '¥25–40', note: '简洁大方的文字排版', hot: false },
                { id: 2, name: '模板美化（10–20 页）', price: '¥40–80', note: '专业模板设计', hot: false },
                { id: 3, name: '工作 / 汇报 / 答辩 PPT', price: '¥80–150', note: '高端定制，专业呈现', hot: false },
                { id: 4, name: '加页', price: '¥3–8 / 页', note: '超出基础页数额外计费', hot: false }
            ],
            video: [
                { id: 1, name: '基础短视频（15–60 秒）', price: '¥30–60', note: '简单剪辑，基础调色', hot: false },
                { id: 2, name: '口播 / 生活 / 探店', price: '¥60–120', note: '剪 + 字幕 + 转场', hot: false },
                { id: 3, name: '带货 / 简单剧情短片', price: '¥90–180', note: '专业包装，效果更佳', hot: false },
                { id: 4, name: '婚礼 / 活动快剪', price: '¥150–300', note: '精彩瞬间记录', hot: false },
                { id: 5, name: '当天加急', price: '+50%', note: '紧急交付项目', hot: true }
            ],
            computer: [
                { id: 1, name: '系统重装 / 重置', price: '¥30–50', note: '全新系统安装', hot: false },
                { id: 2, name: '桌面美化 / 主题图标', price: '¥20–40', note: '个性化桌面定制', hot: false },
                { id: 3, name: '驱动修复 / 软件安装', price: '¥20–35', note: '驱动更新，软件部署', hot: false },
                { id: 4, name: '清理优化 / 提速', price: '¥15–25', note: '系统清理，性能提升', hot: false }
            ],
            steam: [
                { id: 1, name: '代注册账号', price: '¥10–20', note: '快速注册，即开即用', hot: false },
                { id: 2, name: '注册 + 邮箱绑定 + 安全设置', price: '¥20–30', note: '一站式完成，安全无忧', hot: false }
            ],
            rules: [
                '免费修改 2 次，超出另计费',
                '素材 / 资料 / 账号信息客户提供',
                '支持预览，确认后收尾款',
                '加急单上浮 30%–50%'
            ]
        };

        const categoryConfig = {
            ue5: { name: 'UE5.7 场景搭建', icon: 'ph-game-controller', color: '#a855f7' },
            ppt: { name: 'PPT 制作', icon: 'ph-presentation-chart', color: '#f59e0b' },
            video: { name: '视频剪辑', icon: 'ph-film-reel', color: '#ef4444' },
            computer: { name: '电脑美化 / 系统重置', icon: 'ph-desktop', color: '#3b82f6' },
            steam: { name: 'Steam 代注册', icon: 'ph-steam-logo', color: '#22c55e' }
        };

        // 数据管理
        function getData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(defaultData));
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            renderAdmin();
        }

        function generateId(items) {
            return items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
        }

        // 登录
        function checkLogin() {
            const loggedIn = sessionStorage.getItem('adminLoggedIn');
            if (loggedIn === 'true') {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPage').style.display = 'block';
                renderAdmin();
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            if (password === DEFAULT_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPage').style.display = 'block';
                document.getElementById('loginError').style.display = 'none';
                renderAdmin();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPage').style.display = 'none';
            document.getElementById('password').value = '';
        }

        // 渲染管理后台
        function renderAdmin() {
            const data = getData();
            
            // 渲染统计
            let totalItems = 0;
            let hotItems = 0;
            Object.keys(categoryConfig).forEach(key => {
                totalItems += (data[key] || []).length;
                hotItems += (data[key] || []).filter(i => i.hot).length;
            });

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <h3>服务分类</h3>
                    <div class="value">${Object.keys(categoryConfig).length}</div>
                </div>
                <div class="stat-card">
                    <h3>服务项目</h3>
                    <div class="value">${totalItems}</div>
                </div>
                <div class="stat-card">
                    <h3>加急项目</h3>
                    <div class="value">${hotItems}</div>
                </div>
            `;

            // 渲染通用规则
            const rulesHtml = (data.rules || []).map((rule, index) => `
                <div class="rule-item-admin">
                    <input type="text" value="${rule}" onchange="updateRule(${index}, this.value)" style="flex: 1;">
                    <button class="btn btn-danger btn-sm" onclick="deleteRule(${index})">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>
            `).join('') + `
                <button class="btn btn-success btn-sm" onclick="addRule()" style="align-self: flex-start;">
                    <i class="ph ph-plus"></i>
                    添加规则
                </button>
            `;
            document.getElementById('rulesList').innerHTML = rulesHtml;

            // 渲染分类
            let html = '';
            Object.entries(categoryConfig).forEach(([key, config]) => {
                const items = data[key] || [];
                html += `
                    <div class="section category-${key}">
                        <div class="section-header">
                            <h2><i class="ph-fill ${config.icon}"></i> ${config.name}</h2>
                            <button class="btn btn-success btn-sm" onclick="openAddModal('${key}')">
                                <i class="ph ph-plus"></i>
                                添加项目
                            </button>
                        </div>
                        <div class="items-list">
                            ${items.length > 0 ? items.map(item => `
                                <div class="item-card">
                                    <div class="item-card-content">
                                        <div class="item-info">
                                            <h4>${item.name} ${item.hot ? '<span class="item-tag">加急</span>' : ''}</h4>
                                            <div class="price">${item.price}</div>
                                            <div class="note">${item.note || '-'}</div>
                                        </div>
                                        <button class="btn btn-secondary btn-sm" onclick="openEditModal('${key}', ${item.id})">
                                            <i class="ph ph-pencil"></i>
                                        </button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteItem('${key}', ${item.id})">
                                            <i class="ph ph-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('') : `
                                <div class="empty-state">
                                    <i class="ph ph-package"></i>
                                    <p>暂无项目，点击上方按钮添加</p>
                                </div>
                            `}
                        </div>
                    </div>
                `;
            });

            document.getElementById('categoriesContainer').innerHTML = html;
        }

        // 规则管理
        function updateRule(index, value) {
            const data = getData();
            data.rules[index] = value;
            saveData(data);
        }

        function addRule() {
            const data = getData();
            if (!data.rules) data.rules = [];
            data.rules.push('新规则');
            saveData(data);
        }

        function deleteRule(index) {
            if (!confirm('确定删除此规则？')) return;
            const data = getData();
            data.rules.splice(index, 1);
            saveData(data);
        }

        // 模态框操作
        function openAddModal(category) {
            document.getElementById('modalTitle').textContent = '添加项目';
            document.getElementById('itemForm').reset();
            document.getElementById('itemId').value = '';
            document.getElementById('itemCategory').value = category;
            document.getElementById('itemModal').classList.add('active');
        }

        function openEditModal(category, id) {
            const data = getData();
            const item = (data[category] || []).find(i => i.id === id);
            if (!item) return;

            document.getElementById('modalTitle').textContent = '编辑项目';
            document.getElementById('itemId').value = id;
            document.getElementById('itemCategory').value = category;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemPrice').value = item.price;
            document.getElementById('itemNote').value = item.note || '';
            document.getElementById('itemHot').checked = item.hot;
            document.getElementById('itemModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('itemModal').classList.remove('active');
        }

        function saveItem() {
            const id = document.getElementById('itemId').value;
            const category = document.getElementById('itemCategory').value;
            const name = document.getElementById('itemName').value.trim();
            const price = document.getElementById('itemPrice').value.trim();
            const note = document.getElementById('itemNote').value.trim();
            const hot = document.getElementById('itemHot').checked;

            if (!name || !price) {
                showToast('请填写必填项', 'error');
                return;
            }

            const data = getData();
            if (!data[category]) data[category] = [];

            if (id) {
                const index = data[category].findIndex(i => i.id === parseInt(id));
                if (index > -1) {
                    data[category][index] = { id: parseInt(id), name, price, note, hot };
                }
            } else {
                const newId = generateId(data[category]);
                data[category].push({ id: newId, name, price, note, hot });
            }

            saveData(data);
            closeModal();
            showToast(id ? '项目已更新' : '项目已添加', 'success');
        }

        function deleteItem(category, id) {
            if (!confirm('确定要删除这个项目吗？')) return;
            const data = getData();
            data[category] = (data[category] || []).filter(i => i.id !== id);
            saveData(data);
            showToast('项目已删除', 'success');
        }

        // 导入导出
        function exportData() {
            const data = getData();
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `价格表数据_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据已导出', 'success');
        }

        function importData() {
            document.getElementById('importData').value = '';
            document.getElementById('importModal').classList.add('active');
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.remove('active');
        }

        function confirmImport() {
            const json = document.getElementById('importData').value.trim();
            try {
                const data = JSON.parse(json);
                if (confirm('导入将覆盖现有数据，确定继续吗？')) {
                    saveData(data);
                    closeImportModal();
                    showToast('数据导入成功', 'success');
                }
            } catch (e) {
                showToast('JSON 格式错误', 'error');
            }
        }

        function resetData() {
            if (!confirm('确定重置所有数据到默认值？此操作不可恢复！')) return;
            localStorage.removeItem(STORAGE_KEY);
            saveData(defaultData);
            showToast('数据已重置', 'success');
        }

        // Toast 提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="ph ${type === 'success' ? 'ph-check-circle' : 'ph-x-circle'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 初始化
        checkLogin();
    </script>
</body>
</html>
