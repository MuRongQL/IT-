<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="专业服务价格表 - UE5场景搭建、PPT制作、视频剪辑、电脑美化、Steam代注册。透明定价，品质保障。">
    <meta name="theme-color" content="#0a0a0f">
    <title>服务价格表 | 透明定价</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --accent-ue5: #a855f7;
            --accent-ppt: #f59e0b;
            --accent-video: #f43f5e;
            --accent-computer: #3b82f6;
            --accent-steam: #22c55e;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .bg-decoration {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
        }

        .bg-orb-1 {
            width: min(600px, 80vw);
            height: min(600px, 80vw);
            background: radial-gradient(circle, rgba(168, 85, 247, 0.3) 0%, transparent 70%);
            top: -10%; right: -10%;
            animation: float 20s ease-in-out infinite;
        }

        .bg-orb-2 {
            width: min(500px, 70vw);
            height: min(500px, 70vw);
            background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, transparent 70%);
            bottom: -10%; left: -10%;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(3vw, -3vw); }
            66% { transform: translate(-2vw, 2vw); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: clamp(32px, 8vw, 80px) clamp(16px, 4vw, 48px) clamp(48px, 10vw, 100px);
        }

        .header {
            text-align: center;
            margin-bottom: clamp(40px, 10vw, 80px);
        }

        .header-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: clamp(16px, 4vw, 24px);
            flex-wrap: wrap;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            backdrop-filter: blur(10px);
        }

        .header-badge-dot {
            width: 8px; height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .admin-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 100px;
            color: #a855f7;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .admin-link:hover {
            background: rgba(168, 85, 247, 0.2);
        }

        .header h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: clamp(10px, 2vw, 16px);
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: clamp(0.9rem, 2.5vw, 1.125rem);
            color: var(--text-secondary);
        }

        .category { margin-bottom: clamp(40px, 10vw, 64px); }

        .category-header {
            display: flex;
            align-items: center;
            gap: clamp(12px, 3vw, 20px);
            margin-bottom: clamp(20px, 5vw, 32px);
            flex-wrap: wrap;
        }

        .category-icon {
            width: clamp(44px, 10vw, 56px);
            height: clamp(44px, 10vw, 56px);
            border-radius: clamp(12px, 3vw, 16px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .category-icon i { font-size: clamp(1.25rem, 4vw, 1.75rem); color: white; }

        .category-icon.ue5 { background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); }
        .category-icon.ppt { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
        .category-icon.video { background: linear-gradient(135deg, #fb7185 0%, #f43f5e 100%); }
        .category-icon.computer { background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); }
        .category-icon.steam { background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%); }

        .category-info h2 { font-size: clamp(1.1rem, 4vw, 1.5rem); font-weight: 700; margin-bottom: 4px; }
        .category-info p { font-size: clamp(0.8rem, 2vw, 0.9rem); color: var(--text-secondary); }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr));
            gap: clamp(12px, 2vw, 16px);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: clamp(20px, 5vw, 28px);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: clamp(14px, 3vw, 20px);
            flex-wrap: wrap;
        }

        .card h3 {
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            flex: 1;
        }

        .card-tag {
            padding: 4px 10px;
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            white-space: nowrap;
        }

        .card .price {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .card.ue5 .price { color: var(--accent-ue5); }
        .card.ppt .price { color: var(--accent-ppt); }
        .card.video .price { color: var(--accent-video); }
        .card.computer .price { color: var(--accent-computer); }
        .card.steam .price { color: var(--accent-steam); }

        .card .note { font-size: clamp(0.8rem, 2vw, 0.85rem); color: var(--text-secondary); }

        .card-arrow {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 32px; height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            color: var(--text-secondary);
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .card:hover .card-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .rules {
            margin-top: clamp(48px, 12vw, 80px);
            padding: clamp(24px, 6vw, 48px);
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--border-subtle);
            border-radius: 28px;
            backdrop-filter: blur(20px);
        }

        .rules-header { text-align: center; margin-bottom: clamp(24px, 6vw, 40px); }
        .rules-header h2 { font-size: clamp(1.25rem, 4vw, 1.75rem); font-weight: 700; margin-bottom: 8px; }
        .rules-header p { color: var(--text-secondary); font-size: 0.9rem; }

        .rules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(220px, 100%), 1fr));
            gap: clamp(12px, 3vw, 20px);
        }

        .rule-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: clamp(14px, 3.5vw, 18px) clamp(16px, 4vw, 22px);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px solid var(--border-subtle);
            transition: all 0.3s ease;
        }

        .rule-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .rule-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(34, 197, 94, 0.1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .rule-icon i { font-size: 1.25rem; color: #22c55e; }
        .rule-text { font-size: 0.95rem; color: var(--text-primary); }

        .footer {
            text-align: center;
            margin-top: clamp(40px, 10vw, 64px);
            padding-top: clamp(32px, 8vw, 48px);
            border-top: 1px solid var(--border-subtle);
        }

        .footer p { color: var(--text-secondary); font-size: 0.9rem; }

        /* ========== 详情模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 24px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow: hidden;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            position: relative;
            padding: 32px 32px 24px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .modal-category-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .modal-category-badge.ue5 { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
        .modal-category-badge.ppt { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .modal-category-badge.video { background: rgba(244, 63, 94, 0.15); color: #f43f5e; }
        .modal-category-badge.computer { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .modal-category-badge.steam { background: rgba(34, 197, 94, 0.15); color: #22c55e; }

        .modal-category-badge i { font-size: 1rem; }

        .modal-header h2 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .modal-header .modal-price {
            font-size: clamp(2rem, 6vw, 2.5rem);
            font-weight: 800;
        }

        .modal-header.ue5 .modal-price { color: #a855f7; }
        .modal-header.ppt .modal-price { color: #f59e0b; }
        .modal-header.video .modal-price { color: #f43f5e; }
        .modal-header.computer .modal-price { color: #3b82f6; }
        .modal-header.steam .modal-price { color: #22c55e; }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px; height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px 32px 32px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .modal-section {
            margin-bottom: 28px;
        }

        .modal-section:last-child { margin-bottom: 0; }

        .modal-section h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .modal-section h3 i { font-size: 1.1rem; }

        .modal-desc {
            font-size: 1rem;
            color: var(--text-primary);
            line-height: 1.7;
        }

        .modal-features {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-feature {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
        }

        .modal-feature i {
            font-size: 1.25rem;
            color: #22c55e;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .modal-feature span {
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .modal-tips {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal-tip {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .modal-tip i {
            font-size: 1rem;
            color: var(--warning);
        }

        .modal-footer {
            padding: 20px 32px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
        }

        .btn-primary.wechat-btn {
            background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
        }

        .btn-primary.wechat-btn:hover {
            box-shadow: 0 10px 30px rgba(7, 193, 96, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 480px) {
            .modal-header { padding: 24px 20px 20px; }
            .modal-body { padding: 20px; }
            .modal-footer { padding: 16px 20px; flex-direction: column; }
        }

        @media (hover: none) {
            .card:hover {
                transform: none;
                background: var(--bg-card);
                box-shadow: none;
            }
            .card:active {
                background: var(--bg-card-hover);
                transform: scale(0.98);
            }
            .card-arrow { display: none; }
        }
        /* 微信联系弹窗样式 */
        .wechat-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 2000;
        }

        .wechat-modal.active {
            display: flex;
        }

        .wechat-content {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: clamp(32px, 8vw, 48px);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid var(--border-subtle);
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .wechat-icon {
            width: 80px; height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wechat-icon i { font-size: 2.5rem; color: white; }

        .wechat-content h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .wechat-content p {
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .wechat-id-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            margin-bottom: 24px;
        }

        .wechat-id-box span {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'SF Mono', 'Consolas', monospace;
            color: #07c160;
            letter-spacing: 0.1em;
        }

        .wechat-id-box button {
            padding: 8px 16px;
            background: #07c160;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .wechat-id-box button:hover {
            background: #06ad56;
            transform: translateY(-2px);
        }

        .wechat-tips {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .wechat-tip {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .wechat-tip i { color: #07c160; }

        .wechat-close {
            width: 100%;
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .wechat-close:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .copy-toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #07c160;
            color: white;
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 600;
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .copy-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="header-actions">
                <div class="header-badge">
                    <span class="header-badge-dot"></span>
                    <span>服务价格透明 · 品质有保障</span>
                </div>
            </div>
            <h1>服务价格表</h1>
            <p>专业团队 · 高效交付 · 售后无忧</p>
        </div>

        <div id="content"></div>

        <div class="rules" id="rulesSection">
            <div class="rules-header">
                <h2>通用规则</h2>
                <p>下单前请仔细阅读</p>
            </div>
            <div class="rules-grid" id="rulesGrid"></div>
        </div>

        <div class="footer">
            <p>如有疑问，请联系客服咨询详细报价</p>
        </div>
    </div>

    <!-- 微信联系弹窗 -->
    <div class="wechat-modal" id="wechatModal">
        <div class="wechat-content">
            <div class="wechat-icon">
                <i class="ph-fill ph-wechat-logo"></i>
            </div>
            <h3>添加客服微信</h3>
            <p>长按复制微信号，粘贴到微信搜索添加好友</p>
            <div class="wechat-id-box">
                <span id="wechatId">19283479117</span>
                <button onclick="copyWechatId()">
                    <i class="ph ph-copy"></i>
                    复制

        const categoryConfig = {
            ue5: { name: 'UE5.7 场景搭建', subtitle: '虚幻引擎5专业场景制作', icon: 'ph-game-controller' },
            ppt: { name: 'PPT 制作', subtitle: '专业演示文稿设计', icon: 'ph-presentation-chart' },

            computer: { name: '电脑美化 / 系统重置', subtitle: '系统维护与个性化定制', icon: 'ph-desktop' },
            steam: { name: 'Steam 代注册', subtitle: '游戏平台账号服务', icon: 'ph-steam-logo' }
        };

        function getData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : defaultData;
        }

        function render() {
            const data = getData();
            let html = '';

            Object.entries(categoryConfig).forEach(([key, config]) => {
                const items = data[key] || defaultData[key] || [];
                if (items.length === 0) return;

                html += `
                    <div class="category">
                        <div class="category-header">
                            <div class="category-icon ${key}">
                                <i class="ph-fill ${config.icon}"></i>
                            </div>
                            <div class="category-info">
                                <h2>${config.name}</h2>
                                <p>${config.subtitle}</p>
                            </div>
                        </div>
                        <div class="cards">
                            ${items.map((item, index) => `
                                <div class="card ${key}" onclick="openDetail('${key}', ${index})">
                                    <div class="card-header">
                                        <h3>${item.name}</h3>
                                        ${item.hot ? '<span class="card-tag">加急</span>' : ''}
                                    </div>
                                    <div class="price">${item.price}</div>
                                    <div class="note">${item.note || ''}</div>
                                    <div class="card-arrow">
                                        <i class="ph ph-arrow-right"></i>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            document.getElementById('content').innerHTML = html;

            const rules = data.rules || defaultData.rules || [];
            document.getElementById('rulesGrid').innerHTML = rules.map(rule => `
                <div class="rule-item">
                    <div class="rule-icon"><i class="ph ph-check-circle"></i></div>
                    <span class="rule-text">${rule}</span>
                </div>
            `).join('');

            if (rules.length === 0) {
                document.getElementById('rulesSection').style.display = 'none';
            }
        }

        function openDetail(category, index) {
            const data = getData();
            const items = data[category] || defaultData[category] || [];
            const item = items[index];
            if (!item) return;

            const config = categoryConfig[category];

            // 填充数据
            document.getElementById('modalCategoryBadge').className = `modal-category-badge ${category}`;
            document.getElementById('modalCategoryIcon').className = `ph-fill ${config.icon}`;
            document.getElementById('modalCategoryName').textContent = config.name;
            document.getElementById('modalTitle').textContent = item.name;
            document.getElementById('modalPrice').textContent = item.price;
            document.getElementById('modalDesc').textContent = item.desc || item.note || '暂无详细介绍';

            // 填充包含内容
            const features = item.features || [];
            document.getElementById('modalFeatures').innerHTML = features.length > 0
                ? features.map(f => `
                    <div class="modal-feature">
                        <i class="ph ph-check-circle"></i>
                        <span>${f}</span>
                    </div>
                `).join('')
                : '<div class="modal-feature"><span>暂无内容详情</span></div>';

            // 填充注意事项
            const tips = item.tips || [];
            document.getElementById('modalTips').innerHTML = tips.length > 0
                ? tips.map(t => `
                    <div class="modal-tip">
                        <i class="ph ph-warning-circle"></i>
                        <span>${t}</span>
                    </div>
                `).join('')
                : '<div class="modal-tip"><span>暂无特别注意事项</span></div>';

            // 设置头部颜色
            document.getElementById('modalHeader').className = `modal-header ${category}`;

            // 显示模态框
            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function contactUs() {
            closeModal();
            openWechatModal();
        }

        function openWechatModal() {
            document.getElementById('wechatModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeWechatModal() {
            document.getElementById('wechatModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function copyWechatId() {
            const wechatId = document.getElementById('wechatId').textContent;
            navigator.clipboard.writeText(wechatId).then(() => {
                showCopyToast();
            }).catch(() => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = wechatId;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showCopyToast();
            });
        }

        function showCopyToast() {
            const toast = document.getElementById('copyToast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 点击遮罩关闭
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 微信弹窗点击遮罩关闭
        document.getElementById('wechatModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeWechatModal();
            }
        });

        // ESC 关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closeWechatModal();
            }
        });

        render();

        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_KEY) render();
        });

        window.addEventListener('focus', render);
    </script>
